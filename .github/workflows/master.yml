on:
  push:
    branches:
      - master
name: Config Conversion & Schema generation
jobs:
  convert_config_generate_schema:
    name: Convert Config & Generate Schema
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Configure git to trust the workspace despite the different owner
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.3

      - name: Install KSL and generate-v1-only-permissions tools
        run: make init

      # generate ksil json file
      - name: Run Generate V1-Only Permissions Data for stage
        uses: project-kessel/rbac-config-actions/generate-v1-only-permissions@main
        with:
          ksl: configs/stage/schemas
          rbac_permissions: configs/stage/permissions
      - name: Run Generate V1-Only Permissions Data for prod
        uses: project-kessel/rbac-config-actions/generate-v1-only-permissions@main
        with:
          ksl: configs/prod/schemas
          rbac_permissions: configs/prod/permissions

      - name: Convert config to configmaps and generate schemas
        run: |
          set -eux
          CONFIGMAPS_TARGET="${GITHUB_WORKSPACE}/_private/configmaps"
          indent() { sed '2,$s/^/  /'; }

          for ENV in stage prod; do
            mkdir -p "${CONFIGMAPS_TARGET}/${ENV}"

            PERMISSION_DIR="${GITHUB_WORKSPACE}/configs/${ENV}/permissions"
            PERMISSION_CONFIGMAP_FILE="${CONFIGMAPS_TARGET}/${ENV}/model-access-permissions.configmap.yml"

            ROLE_DIR="${GITHUB_WORKSPACE}/configs/${ENV}/roles"
            ROLE_CONFIGMAP_FILE="${CONFIGMAPS_TARGET}/${ENV}/rbac-config.yml"

            for f in "${PERMISSION_CONFIGMAP_FILE}" "${ROLE_CONFIGMAP_FILE}"; do
              printf 'kind: Template\napiVersion: v1\nobjects:\n- ' > "${f}"
            done

            kubectl create configmap model-access-permissions \
              --from-file "${PERMISSION_DIR}" \
              --dry-run=client --validate=false -o yaml | indent >> "${PERMISSION_CONFIGMAP_FILE}"
            kubectl create configmap rbac-config \
              --from-file "${ROLE_DIR}" \
              --dry-run=client --validate=false -o yaml | indent >> "${ROLE_CONFIGMAP_FILE}"

            for f in "${PERMISSION_CONFIGMAP_FILE}" "${ROLE_CONFIGMAP_FILE}"; do
              sed -i '/creationTimestamp: null/d' "${f}"
              printf '%s\n' '    annotations:' '      qontract.recycle: "true"' >> "${f}"
            done
          done

          make ksl-schema-stage ksl-schema-prod
          rm -f configs/stage/schemas/src/rbac_v1_permissions.json \
                configs/prod/schemas/src/rbac_v1_permissions.json

      # validate generated schemas
      - name: Validate Stage Schema
        uses: "authzed/action-spicedb-validate@v1"
        with:
          validationfile: "configs/stage/schemas/schema.zed"
      - name: Validate Prod Schema
        uses: "authzed/action-spicedb-validate@v1"
        with:
          validationfile: "configs/prod/schemas/schema.zed"

      # ghcommit requires the branch to exist and expectedHeadOid must match its tip.
      # Reset to master each run (old convert-config deleted/recreated the branch).
      - name: Reset configmaps-schema branch to master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MASTER_SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/master" --jq .object.sha)
          if gh api "repos/${{ github.repository }}/git/ref/heads/configmaps-schema" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/configmaps-schema" \
              -f sha="${MASTER_SHA}" \
              -F force=true
          else
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref='refs/heads/configmaps-schema' \
              -f sha="${MASTER_SHA}"
          fi
          git fetch origin master configmaps-schema
          echo "configmaps-schema reset to master (${MASTER_SHA})"

      # GitHub API commits are verified; plain git push from convert-config is not.
      - name: Push signed commit to configmaps-schema
        uses: planetscale/ghcommit-action@v0.2.18
        with:
          commit_message: "[GitHub] - Automated ConfigMap & Schema Generation: $(date -u) - ${{ github.sha }}"
          repo: ${{ github.repository }}
          branch: configmaps-schema
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a PR with Config Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin master configmaps-schema

          if ! git rev-parse --verify origin/configmaps-schema >/dev/null 2>&1; then
            echo "origin/configmaps-schema not found after fetch"
            exit 1
          fi

          AHEAD=$(git rev-list --count origin/master..origin/configmaps-schema)
          if [ "${AHEAD}" -eq 0 ]; then
            echo "No commits on configmaps-schema ahead of master; skipping PR"
            exit 0
          fi
          echo "configmaps-schema is ${AHEAD} commit(s) ahead of master"

          EXISTING=$(gh pr list --base master --head configmaps-schema --state open --json url -q '.[0].url')
          if [ -n "${EXISTING}" ]; then
            echo "Open PR already exists: ${EXISTING}"
            exit 0
          fi

          # Do not use --fill-first: ghcommit updates the branch via API and local
          # refs are often missing for gh's internal "origin/master...branch" lookup.
          BODY=$(git log -1 --format='%B' origin/configmaps-schema)

          gh pr create \
            --base master \
            --head configmaps-schema \
            --title "[GitHub] - Automated ConfigMap & Schema Generation" \
            --body "${BODY}"
